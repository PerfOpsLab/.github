name: Update org profile README

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: Why the manual run.
        required: false
        type: string
  repository_dispatch:
    types: [refresh-profile-readme]

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet pyyaml
      - name: Render profile README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/render-profile-readme.py
      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- profile/README.md; then
            echo "No changes to profile/README.md."
            exit 0
          fi
          git config user.name "perfopslab-bot[automation]"
          git config user.email "actions@users.noreply.github.com"
          git add profile/README.md
          git commit -m "chore(profile): refresh README from live org state"
          git push
