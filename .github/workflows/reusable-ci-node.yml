name: Reusable Node CI

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        default: "24"
        type: string
      working_directory:
        description: Directory containing package.json (e.g. apps/web for monorepos).
        required: false
        default: "."
        type: string
      install_cmd:
        required: false
        default: "npm ci"
        type: string
      build_cmd:
        required: false
        default: "npm run build"
        type: string
      test_cmd:
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json
      - name: Install
        run: ${{ inputs.install_cmd }}
      - name: Build
        run: ${{ inputs.build_cmd }}
      - name: Test
        if: ${{ inputs.test_cmd != '' }}
        run: ${{ inputs.test_cmd }}
