name: Reusable VPS deploy

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      app_dir:
        required: true
        type: string
      source_glob:
        required: true
        type: string
      go_version_file:
        required: false
        default: ""
        type: string
      stop_before_deploy:
        required: false
        default: false
        type: boolean
      clean_paths:
        required: false
        default: ""
        type: string
      build_cmd:
        required: false
        default: ""
        type: string
      deploy_script:
        required: false
        default: ""
        type: string
      health_url:
        required: false
        default: ""
        type: string
      public_smoke_url:
        required: false
        default: ""
        type: string
      ref:
        required: false
        default: ""
        type: string
      runner_label:
        required: false
        default: ubuntu-latest
        type: string
    secrets:
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_PORT:
        required: true
      VPS_SSH_KEY:
        required: true

concurrency:
  group: vps-deploy-${{ inputs.service_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.service_name }}
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Go
        if: ${{ inputs.go_version_file != '' }}
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go_version_file }}
          cache: true

      - name: Build
        if: ${{ inputs.build_cmd != '' }}
        run: ${{ inputs.build_cmd }}

      - name: Stop service before deploy
        if: ${{ inputs.stop_before_deploy }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: mkdir -p ${{ inputs.app_dir }} && sudo systemctl stop ${{ inputs.service_name }} || true

      - name: Upload sources to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: ${{ inputs.source_glob }}
          target: ${{ inputs.app_dir }}
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: sudo systemctl reset-failed ${{ inputs.service_name }} 2>/dev/null || true && sudo systemctl restart ${{ inputs.service_name }} && sudo systemctl is-active ${{ inputs.service_name }}

      - name: Internal health probe
        if: ${{ inputs.health_url != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            for i in $(seq 1 20); do
              curl -fsS --max-time 5 ${{ inputs.health_url }} && echo "health OK" && exit 0
              sleep 3
            done
            echo "health failed: ${{ inputs.health_url }}" && exit 1

      - name: Summary
        if: always()
        run: |
          echo "## VPS deploy: ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- App dir: \`${{ inputs.app_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Health: \`${{ inputs.health_url || 'skipped' }}\`" >> $GITHUB_STEP_SUMMARY
