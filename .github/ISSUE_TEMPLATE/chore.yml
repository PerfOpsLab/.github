name: Chore
description: Maintenance work — deps, infra, refactor, docs, CI hygiene.
title: "[CHORE] "
labels: ["type/chore"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What does done look like?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why now? Tech debt, upgrade window, risk reduction, cost.
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Files/services touched, what is explicitly out of scope.
  - type: input
    id: linear
    attributes:
      label: Linear ID
      placeholder: YAP-NNN
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "priority/p0 — critical"
        - "priority/p1 — high"
        - "priority/p2 — normal"
        - "priority/p3 — backlog"
      default: 2
