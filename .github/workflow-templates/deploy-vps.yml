name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Operational reason for this deploy.
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    uses: PerfOpsLab/.github/.github/workflows/reusable-deploy-vps.yml@main
    with:
      # Replace these with your service name and internal port before first run.
      # `with:` values are not shell-expanded — write literal strings here.
      service_name: my-service.service
      app_dir: /home/jarvis/my-service
      source_glob: "."
      health_url: http://127.0.0.1:3000/health
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
